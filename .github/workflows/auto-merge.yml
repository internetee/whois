name: Auto approve & merge Dependabot and Renovate PRs

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled]
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-approve-merge:
    runs-on: ubuntu-latest
    if: (github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]') && github.repository == 'internetee/whois'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh
      - name: Auto approve PR
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Dependabot metadata
        if: github.actor == 'dependabot[bot]'
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if PR should be auto-merged
        id: check_auto_merge
        run: |
          # Set default UPDATE_TYPE to avoid unbound variable errors
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type || 'unknown' }}"
          
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            if [[ "$UPDATE_TYPE" == "version-update:semver-patch" || "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
              echo "Auto-merge: Dependabot patch/minor update detected"
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
              echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
              echo "Auto-merge: Dependabot non-patch/minor update, skipping"
            fi
          elif [ "${{ github.actor }}" == "renovate[bot]" ]; then
            # Check if PR has patch label (set by renovate.json configuration)
            # Extract label names from the labels array
            LABEL_NAMES=$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name' | tr '\n' ' ')
            if [[ " $LABEL_NAMES " =~ ([[:space:]]|^)(patch|minor)([[:space:]]|$) ]] || [[ " $LABEL_NAMES " =~ ([[:space:]]|^)(github-actions)([[:space:]]|$) ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
              echo "Auto-merge: Renovate patch/minor update detected (label-based): $LABEL_NAMES"
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
              echo "Auto-merge: Renovate non-patch update, skipping. Labels: $LABEL_NAMES"
            fi
          else
            echo "auto_merge=false" >> $GITHUB_OUTPUT
            echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
            echo "Auto-merge: Unknown actor, skipping"
          fi
        shell: bash

      - name: Wait for CI checks
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          check-regexp: 'test'

      - name: Mark PR as auto-merge enabled
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const name = 'auto-merge-enabled'

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name,
                color: '0e8a16',
                description: 'Auto-merge was enabled by workflow'
              })
            } catch (e) {
              if (e.status !== 422) throw e
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [name]
            })

      - name: Auto-merge PR
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        run: |
          echo "Attempting to auto-merge PR #${{ github.event.pull_request.number }}"
          gh pr merge --auto --merge ${{ github.event.pull_request.number }} || {
            echo "Auto-merge failed, but continuing..."
            exit 0
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

